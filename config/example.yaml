# OpenVault example configuration

# === Local full backup ===
name: "my-documents-backup"
source: "/home/user/Documents"
strategy: "full"  # full | incremental | differential
storage:
  type: "local"
  path: "/mnt/backup/vault"
exclude:
  - "*.tmp"
  - ".git"
  - "node_modules"
  - "~*"
# schedule: "0 2 * * *"  # daily at 2am (future use)

