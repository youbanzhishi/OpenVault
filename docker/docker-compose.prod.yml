# ============================================================================
# OpenVault Docker Compose — Production Configuration
# ============================================================================
# Multi-replica + Nginx load balancer + PostgreSQL + Monitoring
# ============================================================================
version: "3.8"

services:
  # ------------------------------------------------------------------
  # Nginx reverse proxy / load balancer
  # ------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: openvault-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - openvault-server
    networks:
      - openvault-net

  # ------------------------------------------------------------------
  # OpenVault server (scalable replicas)
  # ------------------------------------------------------------------
  openvault-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    environment:
      - RUST_LOG=openvault_server=info
      - OPENVAULT_BIND=0.0.0.0:8090
      - OPENVAULT_DB_PATH=/data/db/openvault.db
      - OPENVAULT_BACKUP_PATH=/data/backups
      - OPENVAULT_JWT_SECRET=${OPENVAULT_JWT_SECRET}
      - DATABASE_URL=postgresql://openvault:${POSTGRES_PASSWORD:-openvault}@postgres:5432/openvault
    volumes:
      - openvault-db:/data/db
      - openvault-backups:/data/backups
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/api/v1/health"]
      interval: 15s
      timeout: 3s
      start_period: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - openvault-net

  # ------------------------------------------------------------------
  # PostgreSQL (production database)
  # ------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: openvault-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=openvault
      - POSTGRES_USER=openvault
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-openvault}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openvault"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - openvault-net

  # ------------------------------------------------------------------
  # Prometheus monitoring
  # ------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: openvault-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - openvault-net

  # ------------------------------------------------------------------
  # Grafana dashboard
  # ------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.3.0
    container_name: openvault-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - openvault-net

volumes:
  openvault-db:
    driver: local
  openvault-backups:
    driver: local
  postgres-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  openvault-net:
    driver: bridge
