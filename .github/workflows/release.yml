name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: vault
            asset_name: vault-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: vault
            asset_name: vault-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: vault
            asset_name: vault-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: vault.exe
            asset_name: vault-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release -p openvault-cli --target ${{ matrix.target }}
      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: cd target/${{ matrix.target }}/release && tar czf ../../../${{ matrix.asset_name }}.tar.gz ${{ matrix.artifact_name }}
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: cd target/${{ matrix.target }}/release && 7z a ../../../${{ matrix.asset_name }}.zip ${{ matrix.artifact_name }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ matrix.asset_name }}.tar.gz
            ${{ matrix.asset_name }}.zip

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
