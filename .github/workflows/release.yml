# ============================================================================
# OpenVault Release Pipeline
# ============================================================================
# Triggered by tags matching v* (e.g. v1.0.0):
#   - Build Linux x86_64 binary
#   - Build & push Docker image to GHCR
#   - Create GitHub Release with binary artifact
# ============================================================================
name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-binary:
    name: Build Linux Binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Build release binary
        run: cargo build --release -p openvault-server

      - name: Strip binary
        run: strip target/release/openvault-server

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: openvault-server-linux-x86_64
          path: target/release/openvault-server

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-binary
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: openvault-server-linux-x86_64
          path: ./artifacts

      - name: Make binary executable
        run: chmod +x ./artifacts/openvault-server

      - name: Create tarball
        run: |
          cd artifacts
          tar czf openvault-server-linux-x86_64.tar.gz openvault-server

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/openvault-server-linux-x86_64.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
