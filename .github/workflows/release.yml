name: Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
  packages: write
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: vault-linux-amd64
            ext: ''
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: vault-macos-amd64
            ext: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: vault-macos-arm64
            ext: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: vault-windows-amd64.exe
            ext: '.exe'
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          cache-on-failure: true
      - name: Build release binary
        run: cargo build --release -p openvault-cli --target ${{ matrix.target }}
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ matrix.artifact }}.tar.gz vault${{ matrix.ext }}
          mv ${{ matrix.artifact }}.tar.gz ${{ github.workspace }}/
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/vault${{ matrix.ext }}" -DestinationPath "${{ matrix.artifact }}.zip"
          Move-Item -Path "${{ matrix.artifact }}.zip" -Destination "${{ github.workspace }}/"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ github.workspace }}/${{ matrix.artifact }}.tar.gz
            ${{ github.workspace }}/${{ matrix.artifact }}.zip
          if-no-files-found: warn
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          generate_release_notes: true
